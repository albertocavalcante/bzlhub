<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- bzlhub favicon: stylised square brackets evoking Bazel labels //foo:bar.
       Accent-cyan to match the in-app accent token. 32x32 master; renders
       clean down to 16x16 in browser tabs. -->
  <rect width="32" height="32" rx="6" fill="#0a0e14"/>
  <!-- left bracket -->
  <path d="M11 8 L7 8 L7 24 L11 24" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- right bracket -->
  <path d="M21 8 L25 8 L25 24 L21 24" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- centered dot, evoking Bazel label colon //foo:bar -->
  <circle cx="16" cy="16" r="2" fill="#7dd3fc"/>
</svg>
