{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "bzlhub.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "bzlhub.labels" . | nindent 4 }}
  {{- include "bzlhub.annotations" (dict "ctx" . "specific" .Values.serviceAccount.annotations) | nindent 2 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
