{{- if .Values.gateway.enabled -}}
# Gateway API HTTPRoute — gateway.networking.k8s.io/v1 ships in
# every CNCF gateway implementation (Cilium, Envoy Gateway, modern
# Istio, Contour, Kong). Operators who use Gateway API enable this
# instead of the Ingress block.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "bzlhub.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "bzlhub.labels" . | nindent 4 }}
  {{- include "bzlhub.annotations" (dict "ctx" . "specific" (dict)) | nindent 2 }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - backendRefs:
        - name: {{ include "bzlhub.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
