apiVersion: v1
kind: Service
metadata:
  name: {{ include "canopy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "canopy.labels" . | nindent 4 }}
  {{- include "canopy.annotations" (dict "ctx" . "specific" .Values.service.annotations) | nindent 2 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "canopy.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
